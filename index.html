const fm=(n)=>Number(n||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});
const stockSt=(p)=>{if(!p.stock||p.stock<=0)return"agotado";if(p.stock<=3)return"poco";return"ok";};

function loadLS(key,def){try{const s=localStorage.getItem(key);if(s)return JSON.parse(s);}catch(e){}return def;}
function saveLS(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}
function normalizeProducts(prods){return prods.map(p=>({visible:true,...p}));}

/* ── FIREBASE HELPERS ── */
async function fbSaveProducts(prods){
  try{
    const batch=db.batch();
    prods.forEach(p=>{
      const ref=db.collection(FB_PRODUCTS).doc(String(p.id));
      batch.set(ref,p);
    });
    await batch.commit();
  }catch(e){console.error("FB save products:",e);}
}

async function fbSaveOneProduct(p){
  try{
    await db.collection(FB_PRODUCTS).doc(String(p.id)).set(p);
  }catch(e){console.error("FB save one product:",e);}
}

async function fbDeleteProduct(id){
  try{
    await db.collection(FB_PRODUCTS).doc(String(id)).delete();
  }catch(e){console.error("FB delete product:",e);}
}

async function fbLoadProducts(){
  try{
    const snap=await db.collection(FB_PRODUCTS).get();
    if(!snap.empty){
      const prods=snap.docs.map(d=>d.data());
      return normalizeProducts(prods);
    }
  }catch(e){console.error("FB load products:",e);}
  return null;
}

async function fbSaveSale(sale){
  try{
    await db.collection(FB_SALES).doc(String(sale.id)).set(sale);
  }catch(e){console.error("FB save sale:",e);}
}

async function fbLoadSales(){
  try{
    const snap=await db.collection(FB_SALES).orderBy("timestamp","desc").get();
    return snap.docs.map(d=>d.data());
  }catch(e){console.error("FB load sales:",e);}
  return [];
}

function getOwner(id){return OWNERS.find(o=>o.id===id)||OWNERS[2];}

function calcOwnerBreakdown(items){
  const b={nico:0,jeni:0};
  items.forEach(item=>{
    const total=item.price*item.qty;
    if(item.owner==="nico") b.nico+=total;
    else if(item.owner==="jeni") b.jeni+=total;
    else{b.nico+=total/2;b.jeni+=total/2;}
  });
  return b;
}

/* ── PRODUCTIMAGE ── */
function ProductImage({p,size=68,height=155,imgIndex=0}){
  const images=getProductImages(p);
  const src=images[imgIndex]||images[0];
  if(src){
    return <img src={src} alt={p.name} style={{width:"100%",height,objectFit:"cover",display:"block"}} onError={e=>{e.target.style.display="none";}}/>;
  }
  return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size}}>{p.emoji||"📦"}</div>;
}

function getProductImages(p){
  // Soporta hasta 3 imágenes: imageUrl, imageUrl2, imageUrl3
  const imgs=[];
  if(p.imageUrl) imgs.push(p.imageUrl);
  if(p.imageUrl2) imgs.push(p.imageUrl2);
  if(p.imageUrl3) imgs.push(p.imageUrl3);
  return imgs;
}

/* ── LIGHTBOX ── */
function Lightbox({images,startIdx=0,onClose}){
  const [idx,setIdx]=useState(startIdx);
  const prev=()=>setIdx(i=>(i-1+images.length)%images.length);
  const next=()=>setIdx(i=>(i+1)%images.length);
  useEffect(()=>{
    const h=(e)=>{if(e.key==="Escape")onClose();if(e.key==="ArrowLeft")prev();if(e.key==="ArrowRight")next();};
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[]);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      <img src={images[idx]} alt="" onClick={e=>e.stopPropagation()} style={{maxWidth:"95vw",maxHeight:"90vh",objectFit:"contain",borderRadius:8,boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}/>
      {images.length>1&&(
        <>
          <button onClick={e=>{e.stopPropagation();prev();}} style={{position:"absolute",left:12,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:"50%",width:44,height:44,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={e=>{e.stopPropagation();next();}} style={{position:"absolute",right:12,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:"50%",width:44,height:44,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          <div style={{position:"absolute",bottom:20,display:"flex",gap:6}}>
            {images.map((_,i)=><div key={i} onClick={e=>{e.stopPropagation();setIdx(i);}} style={{width:i===idx?22:8,height:8,borderRadius:999,background:i===idx?"#FFE000":"rgba(255,255,255,.4)",cursor:"pointer",transition:"all .2s"}}/>)}
          </div>
        </>
      )}
    </div>
  );
}

/* ── TOAST ── */
function Toast({msg}){
  if(!msg)return null;
  return <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",color:"#FFE000",padding:"10px 22px",borderRadius:999,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 4px 16px rgba(0,0,0,.3)",whiteSpace:"nowrap",pointerEvents:"none"}}>{msg}</div>;
}

/* ── PIN GATE ── */
function PinGate({onAuth,onClose,title}){
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  const check=()=>{
    if(pin===ADMIN_PIN){onAuth();}
    else{setErr(true);setPin("");setTimeout(()=>setErr(false),1500);}
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,padding:32,maxWidth:320,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{fontSize:36,marginBottom:12}}>🔐</div>
        <h2 style={{fontSize:17,fontWeight:800,marginBottom:6}}>{title}</h2>
        <p style={{fontSize:12,color:"#888",marginBottom:20}}>Ingresá la contraseña de administración</p>
        <input type="password" value={pin} onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&check()}
          maxLength={20} placeholder="Contraseña"
          style={{width:"100%",padding:"12px",fontSize:14,letterSpacing:2,textAlign:"center",border:err?"2px solid #e22":"2px solid #e0e0e0",borderRadius:8,outline:"none",marginBottom:8,transition:"border .2s"}}/>
        {err&&<p style={{fontSize:12,color:"#e22",marginBottom:8}}>PIN incorrecto</p>}
        <button onClick={check}
          style={{width:"100%",background:"#FFE000",color:"#1a1a1a",border:"none",padding:"12px",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:8}}>
          Ingresar
        </button>
        <button onClick={onClose}
          style={{width:"100%",background:"none",color:"#888",border:"1px solid #e0e0e0",padding:"10px",borderRadius:8,fontSize:13,cursor:"pointer"}}>
          Cancelar
        </button>
      </div>
    </div>
  );
}

        <div style={{padding:"14px 20px",borderBottom:"1px solid #eee"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Buscar producto por nombre o código…"
            style={{width:"100%",padding:"9px 13px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none"}}/>
          <p style={{fontSize:11,color:"#888",marginTop:6}}>{filtered.length} productos</p>
        </div>
        {/* List */}
        <div style={{maxHeight:"60vh",overflowY:"auto",padding:"12px 20px",display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(p=>{
            const ow=getOwner(p.owner);
            const isHidden=p.visible===false;
            return(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",border:"1.5px solid #eee",borderRadius:10,background:isHidden?"#f8f8f8":"#fafafa",opacity:isHidden?0.6:1}}>
                <div style={{width:46,height:46,background:"#fffbea",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0,overflow:"hidden"}}>
                  {p.imageUrl?<img src={p.imageUrl} style={{width:46,height:46,objectFit:"cover",borderRadius:8}} onError={e=>{e.target.style.display="none";}}/>:p.emoji}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:600,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name} {isHidden&&<span style={{fontSize:10,color:"#e55",fontWeight:700,background:"#fee2e2",padding:"1px 6px",borderRadius:999,marginLeft:4}}>OCULTO</span>}</p>
                  <p style={{fontSize:11,color:"#888",margin:"2px 0 0"}}>Cód: {p.code} · {fm(p.precios[0]?.price||0)} · Stock: {p.stock}</p>
                </div>
                <span style={{background:ow.bg,color:ow.color,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:999,flexShrink:0}}>{ow.label}</span>
                <button onClick={()=>toggleVisible(p)} title={isHidden?"Mostrar producto":"Ocultar producto"}
                  style={{background:isHidden?"#f0fdf4":"#f3f4f6",border:"none",borderRadius:7,padding:"7px 10px",cursor:"pointer",fontSize:16,flexShrink:0}}>
                  {isHidden?"👁️":"🚫"}
                </button>
                <button onClick={()=>openEdit(p)}
                  style={{background:"#FFE000",border:"none",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:700,flexShrink:0}}>
                  ✏️ Editar
                </button>
                <button onClick={()=>deleteProduct(p)} title="Eliminar producto"
                  style={{background:"#fee2e2",border:"none",borderRadius:7,padding:"7px 10px",cursor:"pointer",fontSize:14,flexShrink:0,color:"#dc2626"}}>
                  🗑️
                </button>
              </div>
            );
          })}
          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:"40px 0",color:"#bbb"}}>
              <div style={{fontSize:36}}>🔍</div>
              <p style={{marginTop:8,fontSize:13}}>No hay resultados</p>
            </div>
          )}
        </div>
      </div>
      {editP&&<EditProductModal p={editP} onClose={()=>setEditP(null)} onSave={saveEdit} isNew={!!editP._isNew}/>}
    </div>
  );
}

/* ── EDIT PRODUCT MODAL ── */
function EditProductModal({p,onClose,onSave,isNew}){
  const [form,setForm]=useState({...p});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setPrice=(i,k,v)=>{
    const pr=[...form.precios];
    pr[i]={...pr[i],[k]:k==="price"?Number(v)||0:v};
    setForm(f=>({...f,precios:pr}));
  };
  const addPrice=()=>setForm(f=>({...f,precios:[...f.precios,{qty:"",price:0}]}));
  const removePrice=(i)=>setForm(f=>({...f,precios:f.precios.filter((_,idx)=>idx!==i)}));

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:2500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

        <div style={{padding:"16px 20px",borderBottom:"1px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fffbea"}}>
          <div style={{fontSize:14,fontWeight:700}}>{isNew?"➕ Nuevo producto":"✏️ Editar: "+p.name}</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#555"}}>✕</button>
        </div>
        <div style={{padding:20,display:"flex",flexDirection:"column",gap:14}}>

          {/* Nombre */}
          <label style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5}}>Nombre</span>
            <input value={form.name} onChange={e=>set("name",e.target.value)}
              style={{padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none"}}/>
          </label>

          {/* Código + Stock + Costo */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <label style={{display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5}}>Código</span>
              <input value={form.code} onChange={e=>set("code",e.target.value)}
                style={{padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none"}}/>
            </label>
            <label style={{display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5}}>Stock</span>
              <input type="number" value={form.stock} onChange={e=>set("stock",Number(e.target.value)||0)}
                style={{padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none"}}/>
            </label>
            <label style={{display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5}}>Costo $</span>
              <input type="number" value={form.costo||0} onChange={e=>set("costo",Number(e.target.value)||0)}
                style={{padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none"}}/>
            </label>
          </div>

          {/* Panel de ganancias */}
          {form.costo>0&&form.precios.length>0&&(
            <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:10,padding:12}}>
              <p style={{fontSize:11,fontWeight:700,color:"#16a34a",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>💰 Ganancia estimada por presentación</p>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {form.precios.map((pr,i)=>{
                  const precio=Number(pr.price)||0;
                  const costo=Number(form.costo)||0;
                  const ganancia=precio-costo;
                  const margen=precio>0?Math.round((ganancia/precio)*100):0;
                  const color=ganancia>0?"#15803d":ganancia===0?"#92400e":"#dc2626";
                  const bg=ganancia>0?"#dcfce7":ganancia===0?"#fef3c7":"#fee2e2";

                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:bg,borderRadius:7,padding:"8px 12px"}}>

                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:11,color:"#888"}}>Precio: {fm(precio)}</span>
                        <span style={{fontSize:13,fontWeight:800,color}}>{ganancia>=0?"+":""}{fm(ganancia)}</span>
                        <span style={{fontSize:11,fontWeight:700,color,background:"rgba(0,0,0,.06)",padding:"2px 7px",borderRadius:999}}>{margen}%</span>
                      </div>
                    </div>

                })}
              </div>
            </div>

          {/* Imágenes del producto (hasta 3) */}
          <div>
            <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:8}}>Fotos del producto (hasta 3)</span>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
              {["imageUrl","imageUrl2","imageUrl3"].map((field,i)=>(

                  <div style={{borderRadius:8,overflow:"hidden",border:form[field]?"2px solid #FFE000":"2px dashed #e0e0e0",height:90,display:"flex",alignItems:"center",justifyContent:"center",background:"#fafafa",position:"relative",marginBottom:4}}>

                        <button onClick={()=>set(field,"")} style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:999,width:20,height:20,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                      </>
                      :<span style={{fontSize:28,opacity:.3}}>{i===0?"📷":"+"}</span>
                    }
                  </div>
                  <label style={{display:"block"}}>
                    <span style={{display:"block",textAlign:"center",padding:"5px",background:form[field]?"#f0f0f0":"#1a1a1a",color:form[field]?"#555":"#FFE000",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600}}>
                      {form[field]?"Cambiar":"+ Foto "+(i+1)}
                    </span>
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                      const file=e.target.files[0];
                      if(!file)return;
                      const reader=new FileReader();
                      reader.onload=ev=>set(field,ev.target.result);
                      reader.readAsDataURL(file);
                    }}/>
                  </label>
                </div>
              ))}
            </div>
            {/* Emoji de respaldo */}
            <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:8,alignItems:"start"}}>
              <label style={{display:"flex",flexDirection:"column",gap:4}}>
                <span style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase"}}>Emoji</span>
                <input value={form.emoji} onChange={e=>set("emoji",e.target.value)}
                  style={{padding:"9px 8px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:18,outline:"none",textAlign:"center"}}/>
              </label>
              <label style={{display:"flex",flexDirection:"column",gap:4}}>
                <span style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase"}}>O URL de imagen</span>
                <input value={form.imageUrl&&!form.imageUrl.startsWith("data:")?form.imageUrl:""} onChange={e=>set("imageUrl",e.target.value)}
                  placeholder="https://…"
                  style={{padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:12,outline:"none"}}/>
              </label>
            </div>
          </div>

          {/* Propietario */}
          <div>
            <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:8}}>Propietario del producto</span>
            <div style={{display:"flex",gap:8}}>
              {OWNERS.map(ow=>(
                <button key={ow.id} onClick={()=>set("owner",ow.id)}
                  style={{flex:1,padding:"10px 8px",border:form.owner===ow.id?`2px solid ${ow.color}`:"2px solid #e0e0e0",
                          borderRadius:8,background:form.owner===ow.id?ow.bg:"#fff",
                          color:form.owner===ow.id?ow.color:"#555",
                          fontWeight:form.owner===ow.id?800:400,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
                  {ow.label}
                </button>
              ))}
            </div>
          </div>

          {/* Categoría */}
          <label style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5}}>Categoría</span>
            <select value={form.cat} onChange={e=>set("cat",e.target.value)}
              style={{padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none",background:"#fff"}}>
              {CATS.filter(c=>c.id!=="todos").map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
          </label>

          {/* Precios */}
          <div>
            <span style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:8}}>Precios / Presentaciones</span>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {form.precios.map((pr,i)=>{
                const ganancia=(Number(pr.price)||0)-(Number(form.costo)||0);
                const showGain=form.costo>0;
                return(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:6,alignItems:"center"}}>
                    <input value={pr.qty} onChange={e=>setPrice(i,"qty",e.target.value)}
                      placeholder="Ej: 1 litro"
                      style={{padding:"8px 10px",border:"1.5px solid #e0e0e0",borderRadius:7,fontSize:12,outline:"none"}}/>
                    <div style={{position:"relative"}}>
                      <input type="number" value={pr.price} onChange={e=>setPrice(i,"price",e.target.value)}
                        placeholder="Precio"
                        style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${showGain?(ganancia>0?"#86efac":ganancia<0?"#fca5a5":"#e0e0e0"):"#e0e0e0"}`,borderRadius:7,fontSize:12,outline:"none"}}/>
                    </div>
                    <button onClick={()=>removePrice(i)}
                      style={{background:"#fee2e2",border:"none",borderRadius:7,padding:"8px 10px",cursor:"pointer",color:"#e22",fontSize:14}}>✕</button>
                  </div>
                );
              })}
              <button onClick={addPrice}
                style={{background:"#f0fdf4",border:"1.5px dashed #86efac",borderRadius:7,padding:"8px",cursor:"pointer",color:"#16a34a",fontSize:12,fontWeight:600}}>
                + Agregar presentación
              </button>
            </div>
          </div>

          {/* Oferta */}
          <div style={{background:"#fffbea",borderRadius:8,padding:12,border:"1px solid #fde68a"}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:form.oferta?10:0}}>
              <input type="checkbox" checked={form.oferta} onChange={e=>set("oferta",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>⚡ Producto en oferta</span>
            </label>
            {form.oferta&&(
              <div style={{marginTop:8}}>
                <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",display:"block",marginBottom:4}}>Precio de oferta</label>
                <input type="number" value={form.precioOferta||""} onChange={e=>set("precioOferta",Number(e.target.value)||"")}
                  placeholder="Ej: 15000"
                  style={{width:"100%",padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none"}}/>
              </div>
            )}
          </div>

          {/* Botones */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:4}}>
            <button onClick={onClose}
              style={{padding:"12px",background:"none",border:"1.5px solid #e0e0e0",borderRadius:8,cursor:"pointer",fontSize:13,color:"#555"}}>
              Cancelar
            </button>
            <button onClick={()=>onSave(form)}
              style={{padding:"12px",background:"#FFE000",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:800,color:"#1a1a1a"}}>
              {isNew?"✅ Crear producto":"💾 Guardar"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── VENTA INTERNA ── */
function VentaInterna({products,onClose,onSave}){
  const [search,setSearch]=useState("");
  const [cart,setCart]=useState([]);
  const [pago,setPago]=useState("efectivo");
  const [cliente,setCliente]=useState("");
  const [done,setDone]=useState(false);
  const [lastSale,setLastSale]=useState(null);

  const filtered=useMemo(()=>{
    if(!search.trim()) return products.slice(0,30);
    return products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.code.includes(search)).slice(0,30);
  },[search,products]);

  const addItem=(p,optIdx=0)=>{
    const pr=p.precios[optIdx]||p.precios[0];
    setCart(prev=>{
      const ex=prev.find(i=>i.id===p.id&&i.selectedQty===pr.qty);
      if(ex)return prev.map(i=>i.id===p.id&&i.selectedQty===pr.qty?{...i,qty:i.qty+1}:i);
      return [...prev,{...p,price:pr.price,selectedQty:pr.qty,qty:1}];
    });
  };

  const removeItem=(item)=>setCart(prev=>prev.filter(i=>!(i.id===item.id&&i.selectedQty===item.selectedQty)));
  const changeQty=(item,qty)=>{
    if(qty<1){removeItem(item);return;}
    setCart(prev=>prev.map(i=>i.id===item.id&&i.selectedQty===item.selectedQty?{...i,qty}:i));
  };

  const pg=PAGOS.find(x=>x.id===pago);
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const recargo=Math.round(subtotal*(pg?.recargo||0)/100);
  const total=subtotal+recargo;

  const confirm=()=>{
    if(cart.length===0)return;
    const sale={
      id:Date.now(),
      timestamp:new Date().toISOString(),
      items:cart.map(i=>({id:i.id,name:i.name,qty:i.qty,price:i.price,selectedQty:i.selectedQty,owner:i.owner||"compartido",cat:i.cat})),
      pago,cliente,subtotal,recargo,total,
      ownerBreakdown:calcOwnerBreakdown(cart),
    };
    onSave(sale);
    setLastSale(sale);
    setDone(true);
  };

  if(done&&lastSale){
    const bd=lastSale.ownerBreakdown;
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:1500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:420,padding:32,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
          <div style={{fontSize:52}}>✅</div>
          <h2 style={{fontSize:18,fontWeight:800,margin:"12px 0 6px"}}>¡Venta registrada!</h2>
          <p style={{fontSize:13,color:"#888",marginBottom:20}}>{new Date(lastSale.timestamp).toLocaleString("es-AR")}</p>
          <div style={{background:"#f5f5f5",borderRadius:10,padding:16,marginBottom:16,textAlign:"left"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:"#666"}}>Pago:</span>
              <span style={{fontSize:12,fontWeight:600}}>{PAGOS.find(x=>x.id===lastSale.pago)?.label}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:"#666"}}>Subtotal:</span>
              <span style={{fontSize:12,fontWeight:600}}>{fm(lastSale.subtotal)}</span>
            </div>
            {lastSale.recargo>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:"#e22"}}>Recargo:</span>
              <span style={{fontSize:12,fontWeight:600,color:"#e22"}}>+{fm(lastSale.recargo)}</span>
            </div>}
            <div style={{display:"flex",justifyContent:"space-between",borderTop:"2px solid #FFE000",paddingTop:8,marginTop:4}}>
              <span style={{fontWeight:800}}>Total</span>
              <span style={{fontWeight:800,fontSize:15}}>{fm(lastSale.total)}</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            <div style={{background:"#eff6ff",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#3b82f6",marginBottom:4}}>NICO</div>
              <div style={{fontSize:14,fontWeight:800,color:"#1d4ed8"}}>{fm(bd.nico)}</div>
            </div>
            <div style={{background:"#fdf2f8",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#ec4899",marginBottom:4}}>JENI</div>
              <div style={{fontSize:14,fontWeight:800,color:"#be185d"}}>{fm(bd.jeni)}</div>
            </div>
          </div>
          <button onClick={onClose}
            style={{width:"100%",background:"#FFE000",border:"none",borderRadius:8,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
            Listo 👍
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:1500,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:820,boxShadow:"0 20px 60px rgba(0,0,0,.3)",marginTop:20}}>
        {/* Header */}
        <div style={{background:"#1a1a1a",borderRadius:"14px 14px 0 0",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:"#FFE000"}}>🧾 Registrar Venta</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>Uso interno · Conti Hogar</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>✕ Cerrar</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:0}}>
          {/* Left: productos */}
          <div style={{borderRight:"1px solid #eee",padding:16}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Buscar producto…"
              style={{width:"100%",padding:"9px 13px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none",marginBottom:10}}/>
            <div style={{maxHeight:"55vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {filtered.map(p=>{
                const ow=getOwner(p.owner||"compartido");
                return(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",border:"1.5px solid #eee",borderRadius:9,background:"#fafafa",cursor:"pointer"}}
                    onClick={()=>addItem(p)}>
                    <div style={{fontSize:22,width:36,height:36,background:"#fffbea",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>

                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:12,fontWeight:600,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</p>
                      <p style={{fontSize:11,color:"#888",margin:"2px 0 0"}}>{fm(p.precios[0]?.price||0)} · {p.precios[0]?.qty}</p>
                    </div>
                    <span style={{background:ow.bg,color:ow.color,fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:999,flexShrink:0}}>{ow.label}</span>
                    {p.precios.length>1&&(
                      <div style={{display:"flex",flexDirection:"column",gap:4}}>
                        {p.precios.map((pr,i)=>(
                          <button key={i} onClick={e=>{e.stopPropagation();addItem(p,i);}}
                            style={{background:"#FFE000",border:"none",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>
                            +{pr.qty}
                          </button>
                        ))}
                      </div>
                    )}
                    {p.precios.length===1&&(
                      <button style={{background:"#FFE000",border:"none",borderRadius:6,padding:"6px 10px",cursor:"pointer",fontSize:13,fontWeight:700}}>+</button>
                    )}
                  </div>
                );
              })}
              {filtered.length===0&&<p style={{textAlign:"center",color:"#aaa",padding:20,fontSize:13}}>No hay resultados</p>}
            </div>
          </div>

          {/* Right: carrito */}
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5}}>Ticket de venta</div>
            <div style={{flex:1,maxHeight:"30vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {cart.length===0&&<p style={{color:"#bbb",fontSize:12,textAlign:"center",padding:"20px 0"}}>Agregá productos desde la lista →</p>}
              {cart.map(item=>(
                <div key={`${item.id}-${item.selectedQty}`} style={{display:"flex",alignItems:"center",gap:8,padding:"8px",background:"#fafafa",borderRadius:8,border:"1px solid #eee"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:11,fontWeight:600,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</p>
                    <p style={{fontSize:10,color:"#888",margin:"2px 0 0"}}>{item.selectedQty} · {fm(item.price)}</p>
                  </div>
                  <button onClick={()=>changeQty(item,item.qty-1)} style={{background:"#f0f0f0",border:"none",borderRadius:4,width:20,height:20,cursor:"pointer",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                  <span style={{fontSize:12,fontWeight:700,minWidth:18,textAlign:"center"}}>{item.qty}</span>
                  <button onClick={()=>changeQty(item,item.qty+1)} style={{background:"#f0f0f0",border:"none",borderRadius:4,width:20,height:20,cursor:"pointer",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  <span style={{fontSize:11,fontWeight:700,minWidth:52,textAlign:"right"}}>{fm(item.price*item.qty)}</span>
                  <button onClick={()=>removeItem(item)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:13}}>🗑️</button>
                </div>
              ))}
            </div>

            {/* Cliente */}
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:4}}>Cliente (opcional)</label>
              <input value={cliente} onChange={e=>setCliente(e.target.value)}
                placeholder="Nombre del cliente…"
                style={{width:"100%",padding:"8px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:12,outline:"none"}}/>
            </div>

            {/* Pago */}
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:6}}>Forma de pago</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {PAGOS.map(pg2=>(
                  <button key={pg2.id} onClick={()=>setPago(pg2.id)}
                    style={{padding:"7px 5px",border:pago===pg2.id?"2px solid #1a1a1a":"1.5px solid #e0e0e0",
                            borderRadius:6,background:pago===pg2.id?"#FFE000":"#fff",cursor:"pointer",
                            textAlign:"center",fontSize:11,fontWeight:pago===pg2.id?700:400}}>
                    {pg2.icon} {pg2.label}
                    {pg2.sub&&<span style={{display:"block",fontSize:9,color:"#e22"}}>{pg2.sub}</span>}
                  </button>
                ))}
              </div>
            </div>

            {/* Totales */}
            <div style={{background:"#f5f5f5",borderRadius:8,padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                <span style={{color:"#666"}}>Subtotal</span><span>{fm(subtotal)}</span>
              </div>
              {recargo>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#e22",marginBottom:4}}>
                <span>Recargo ({pg?.recargo}%)</span><span>+{fm(recargo)}</span>
              </div>}
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:15,borderTop:"2px solid #FFE000",paddingTop:8,marginTop:4}}>
                <span>Total</span><span>{fm(total)}</span>
              </div>
            </div>

            <button onClick={confirm} disabled={cart.length===0}
              style={{width:"100%",background:cart.length===0?"#e8e8e8":"#1a1a1a",color:cart.length===0?"#aaa":"#FFE000",
                      border:"none",borderRadius:8,padding:"13px",fontSize:14,fontWeight:700,
                      cursor:cart.length===0?"not-allowed":"pointer"}}>
              ✅ Confirmar Venta
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ESTADÍSTICAS ── */
function EstadisticasPanel({sales,onClose}){
  const [period,setPeriod]=useState("all");

  const now=new Date();
  const filtered=sales.filter(s=>{
    const d=new Date(s.timestamp);
    if(period==="today"){const t=new Date();t.setHours(0,0,0,0);return d>=t;}
    if(period==="week"){const t=new Date();t.setDate(t.getDate()-7);return d>=t;}
    if(period==="month"){const t=new Date();t.setDate(1);t.setHours(0,0,0,0);return d>=t;}
    return true;
  });

  const totalVentas=filtered.length;
  const totalIngresos=filtered.reduce((s,x)=>s+x.total,0);
  const totalNico=filtered.reduce((s,x)=>s+(x.ownerBreakdown?.nico||0),0);
  const totalJeni=filtered.reduce((s,x)=>s+(x.ownerBreakdown?.jeni||0),0);

  // Top productos
  const prodMap={};
  filtered.forEach(sale=>{
    sale.items.forEach(item=>{
      if(!prodMap[item.name]) prodMap[item.name]={name:item.name,qty:0,total:0};
      prodMap[item.name].qty+=item.qty;
      prodMap[item.name].total+=item.price*item.qty;
    });
  });
  const topProds=Object.values(prodMap).sort((a,b)=>b.total-a.total).slice(0,8);

  // Ventas por día (últimos 7 días)
  const dayMap={};
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dayMap[d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric"})]={label:d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric"}),total:0,count:0};}
  filtered.forEach(sale=>{
    const d=new Date(sale.timestamp);
    const k=d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric"});
    if(dayMap[k]){dayMap[k].total+=sale.total;dayMap[k].count++;}
  });
  const days=Object.values(dayMap);
  const maxDay=Math.max(...days.map(d=>d.total),1);

  // Pagos
  const pagoMap={};
  filtered.forEach(s=>{pagoMap[s.pago]=(pagoMap[s.pago]||0)+s.total;});

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:1500,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:820,boxShadow:"0 20px 60px rgba(0,0,0,.3)",marginTop:20,marginBottom:20}}>
        {/* Header */}
        <div style={{background:"#1a1a1a",borderRadius:"14px 14px 0 0",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:"#FFE000"}}>📊 Estadísticas de Ventas</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>{totalVentas} ventas registradas</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>✕ Cerrar</button>
        </div>

        <div style={{padding:20}}>
          {/* Filtro período */}
          <div style={{display:"flex",gap:6,marginBottom:20}}>
            {[["today","Hoy"],["week","Esta semana"],["month","Este mes"],["all","Todo"]].map(([id,label])=>(
              <button key={id} onClick={()=>setPeriod(id)}
                style={{padding:"6px 14px",borderRadius:999,border:"none",cursor:"pointer",fontSize:12,fontWeight:period===id?700:400,
                        background:period===id?"#1a1a1a":"#f0f0f0",color:period===id?"#FFE000":"#555"}}>
                {label}
              </button>
            ))}
          </div>

          {sales.length===0?(
            <div style={{textAlign:"center",padding:"60px 0",color:"#aaa"}}>
              <div style={{fontSize:48}}>📭</div>
              <p style={{marginTop:12,fontSize:14}}>Todavía no hay ventas registradas</p>
              <p style={{fontSize:12,marginTop:4}}>Usá el botón 🧾 Venta para registrar la primera</p>
            </div>
          ):(
            <>
              {/* KPIs */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:20}}>
                <div style={{background:"#1a1a1a",borderRadius:10,padding:"16px",textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#aaa",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Total ingresos</div>
                  <div style={{fontSize:20,fontWeight:900,color:"#FFE000",marginTop:4}}>{fm(totalIngresos)}</div>
                </div>
                <div style={{background:"#eff6ff",borderRadius:10,padding:"16px",textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#3b82f6",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>NICO</div>
                  <div style={{fontSize:20,fontWeight:900,color:"#1d4ed8",marginTop:4}}>{fm(totalNico)}</div>
                  <div style={{fontSize:10,color:"#60a5fa",marginTop:2}}>{totalIngresos>0?Math.round(totalNico/totalIngresos*100):0}%</div>
                </div>
                <div style={{background:"#fdf2f8",borderRadius:10,padding:"16px",textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#ec4899",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>JENI</div>
                  <div style={{fontSize:20,fontWeight:900,color:"#be185d",marginTop:4}}>{fm(totalJeni)}</div>
                  <div style={{fontSize:10,color:"#f472b6",marginTop:2}}>{totalIngresos>0?Math.round(totalJeni/totalIngresos*100):0}%</div>
                </div>
                <div style={{background:"#f0fdf4",borderRadius:10,padding:"16px",textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#16a34a",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Ventas</div>
                  <div style={{fontSize:20,fontWeight:900,color:"#15803d",marginTop:4}}>{totalVentas}</div>
                  <div style={{fontSize:10,color:"#4ade80",marginTop:2}}>{totalVentas>0?fm(Math.round(totalIngresos/totalVentas)):fm(0)} promedio</div>
                </div>
              </div>

              {/* Gráfico últimos 7 días */}
              <div style={{background:"#f9f9f9",borderRadius:10,padding:16,marginBottom:16}}>
                <p style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:12,textTransform:"uppercase",letterSpacing:.5}}>Ventas últimos 7 días</p>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:100}}>
                  {days.map((d,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      <span style={{fontSize:9,color:"#888",fontWeight:600}}>{d.total>0?fm(d.total).replace(/\s/g,"").replace("$","$"):"—"}</span>
                      <div style={{width:"100%",background:d.total>0?"#FFE000":"#e5e5e5",borderRadius:"3px 3px 0 0",height:Math.max(4,Math.round((d.total/maxDay)*70)),transition:"height .3s"}}/>
                      <span style={{fontSize:9,color:"#888",textAlign:"center",whiteSpace:"nowrap"}}>{d.label}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {/* Top productos */}
                <div style={{background:"#f9f9f9",borderRadius:10,padding:14}}>
                  <p style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Top Productos</p>
                  {topProds.length===0?<p style={{color:"#bbb",fontSize:12}}>Sin datos</p>:topProds.map((p,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #eee"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:10,fontWeight:700,color:"#aaa",minWidth:16}}>#{i+1}</span>
                        <span style={{fontSize:11,fontWeight:600,color:"#1a1a1a"}}>{p.name.slice(0,24)}</span>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:11,fontWeight:700}}>{fm(p.total)}</div>
                        <div style={{fontSize:9,color:"#aaa"}}>{p.qty} uds</div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Por forma de pago */}
                <div style={{background:"#f9f9f9",borderRadius:10,padding:14}}>
                  <p style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Por forma de pago</p>
                  {Object.keys(pagoMap).length===0?<p style={{color:"#bbb",fontSize:12}}>Sin datos</p>:
                    PAGOS.filter(pg=>pagoMap[pg.id]).map(pg=>(
                      <div key={pg.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #eee"}}>
                        <span style={{fontSize:12}}>{pg.icon} {pg.label}</span>
                        <span style={{fontSize:12,fontWeight:700}}>{fm(pagoMap[pg.id]||0)}</span>
                      </div>
                    ))
                  }
                  <div style={{marginTop:12}}>
                    <p style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:8}}>Últimas ventas</p>
                    {filtered.slice(-5).reverse().map(s=>(
                      <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #f0f0f0"}}>
                        <div>
                          <span style={{fontSize:10,color:"#888"}}>{new Date(s.timestamp).toLocaleDateString("es-AR")} {new Date(s.timestamp).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}</span>
                          {s.cliente&&<span style={{fontSize:10,color:"#555",marginLeft:6}}>· {s.cliente}</span>}
                        </div>
                        <span style={{fontSize:11,fontWeight:700}}>{fm(s.total)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── PRODUCT CARD ── */
function ProductCard({p,onSelect,onAdd,wished,onWish}){
  const [hov,setHov]=useState(false);
  const [lightbox,setLightbox]=useState(false);
  const st=stockSt(p);
  const mainPrice=p.oferta&&p.precioOferta?p.precioOferta:(p.precios[0]?.price||0);
  const basePrice=p.precios[0]?.price||0;
  const images=getProductImages(p);
  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:"#fff",borderRadius:8,overflow:"hidden",
              border:hov?"1.5px solid #FFE000":"1px solid #e0e0e0",
              transition:"all .15s",transform:hov?"translateY(-2px)":"none",
              boxShadow:hov?"0 6px 20px rgba(255,224,0,.2)":"0 1px 4px rgba(0,0,0,.07)",
              cursor:"pointer",display:"flex",flexDirection:"column"}}>
      <div onClick={()=>images.length>0?setLightbox(true):onSelect(p)} style={{position:"relative",background:"#fffbea",height:155,overflow:"hidden"}}>
        <ProductImage p={p} size={68} height={155}/>
        {p.oferta&&<span style={{position:"absolute",top:8,left:8,background:"#e22",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:3,zIndex:1}}>OFERTA</span>}
        {images.length>1&&<span style={{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,.55)",color:"#fff",fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:3,zIndex:1}}>📷 {images.length}</span>}
        <button onClick={e=>{e.stopPropagation();onWish(p.id);}} style={{position:"absolute",top:6,right:6,background:"rgba(255,255,255,.9)",border:"none",borderRadius:"50%",width:26,height:26,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1}}>{wished?"❤️":"🤍"}</button>
        {st==="poco"&&<span style={{position:"absolute",bottom:8,left:images.length>1?50:8,background:"#fff3cd",color:"#856404",fontSize:10,fontWeight:600,padding:"2px 6px",borderRadius:3,border:"1px solid #ffc107",zIndex:1}}>¡Solo {p.stock}!</span>}
        {st==="agotado"&&<span style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,zIndex:1}}>Sin stock</span>}
      </div>
      <div onClick={()=>onSelect(p)} style={{padding:"10px 12px 6px",flex:1}}>
        <p style={{margin:"0 0 2px",fontSize:10,color:"#888"}}>Cód: {p.code} · {p.tipo==="litro"?"Por litro":"Por unidad"}</p>
        <p style={{margin:"0 0 6px",fontSize:12,lineHeight:1.3,fontWeight:600,color:"#1a1a1a",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{p.name}</p>
        {p.oferta&&p.precioOferta&&<span style={{fontSize:11,color:"#aaa",textDecoration:"line-through"}}>{fm(basePrice)}</span>}
        <p style={{margin:"2px 0 0",fontSize:17,fontWeight:800,color:"#1a1a1a"}}>{fm(mainPrice)}</p>
        <p style={{margin:"2px 0 0",fontSize:11,color:"#666"}}>desde · {p.precios[0]?.qty}</p>
      </div>
      <div style={{padding:"8px 12px 12px"}}>
        {st==="agotado"
          ?<button style={{width:"100%",background:"#e8e8e8",color:"#aaa",border:"none",padding:"8px",borderRadius:5,fontSize:12,fontWeight:600,cursor:"not-allowed"}}>Sin stock</button>
          :<button onClick={e=>{e.stopPropagation();onAdd(p);}} style={{width:"100%",background:hov?"#FFE000":"#fffbea",color:"#1a1a1a",border:"1.5px solid #d4bb00",padding:"8px",borderRadius:5,fontSize:12,fontWeight:700,cursor:"pointer",transition:"background .15s"}}>+ Agregar al carrito</button>
        }
      </div>
      {lightbox&&images.length>0&&<Lightbox images={images} onClose={()=>setLightbox(false)}/>}
    </div>
  );
}

/* ── PRODUCT MODAL ── */

            style={{background:"#fffbea",borderRadius:10,height:200,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:images.length>1?8:14,overflow:"hidden",cursor:images.length>0?"zoom-in":"default",position:"relative"}}>

            {images.length>0&&<div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.45)",color:"#fff",fontSize:10,padding:"3px 8px",borderRadius:999}}>🔍 Ver</div>}

                  <img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={`foto ${i+1}`}/>

              ))}
            </div>
          )}
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:10,color:"#1a1a1a"}}>{p.name}</h2>
          {st==="poco"&&<div style={{background:"#fff3cd",border:"1px solid #ffc107",borderRadius:4,padding:"6px 12px",fontSize:12,color:"#856404",fontWeight:600,marginBottom:8}}>⚠️ ¡Solo quedan {p.stock} en stock!</div>}
          {st==="agotado"&&<div style={{background:"#f8d7da",border:"1px solid #f5c2c7",borderRadius:4,padding:"6px 12px",fontSize:12,color:"#721c24",fontWeight:600,marginBottom:8}}>❌ Sin stock disponible</div>}
          <p style={{fontSize:11,color:"#888",marginBottom:7,fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Elegí la cantidad / presentación:</p>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            {opts.map((o,i)=>(
              <button key={i} onClick={()=>setSelIdx(i)}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",
                        border:selIdx===i?"2px solid #1a1a1a":"1.5px solid #e0e0e0",
                        borderRadius:6,background:selIdx===i?"#fffbea":"#fff",cursor:"pointer",
                        fontSize:13,fontWeight:selIdx===i?700:400}}>
                <span>{o.qty}</span>
                <span style={{fontWeight:700}}>{fm(o.price)}</span>
              </button>
            ))}
          </div>
          <button onClick={()=>{if(st!=="agotado"){onAdd(p,sel);}}} disabled={st==="agotado"}
            style={{width:"100%",background:st==="agotado"?"#e8e8e8":"#FFE000",color:st==="agotado"?"#aaa":"#1a1a1a",
                    border:"none",padding:"13px",borderRadius:6,fontSize:14,fontWeight:700,
                    cursor:st==="agotado"?"not-allowed":"pointer",marginBottom:8}}>
            {st==="agotado"?"Sin stock disponible":"Agregar al carrito"}
          </button>
          <button onClick={onClose} style={{width:"100%",background:"none",color:"#888",border:"1px solid #e0e0e0",padding:"10px",borderRadius:6,fontSize:13,cursor:"pointer"}}>Cerrar</button>
        </div>
      </div>
      {lightbox&&images.length>0&&<Lightbox images={images} startIdx={imgIdx} onClose={()=>setLightbox(false)}/>}
    </div>
  );
}

/* ── CART DRAWER ── */
function CartDrawer({cart,onClose,onRemove,onQtyChange,onCheckout}){
  const [pago,setPago]=useState("efectivo");
  const [fecha,setFecha]=useState(new Date().toISOString().split("T")[0]);
  const pg=PAGOS.find(x=>x.id===pago);
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const recargo=Math.round(subtotal*(pg?.recargo||0)/100);
  const total=subtotal+recargo;
  return(
    <div style={{position:"fixed",inset:0,zIndex:900,display:"flex"}}>
      <div onClick={onClose} style={{flex:1,background:"rgba(0,0,0,.45)"}}/>
      <div style={{width:360,background:"#fff",overflowY:"auto",boxShadow:"-6px 0 30px rgba(0,0,0,.15)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 18px",borderBottom:"1px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fffbea",position:"sticky",top:0,zIndex:1}}>
          <div>
            <p style={{margin:0,fontWeight:800,fontSize:15}}>🛒 Mi carrito</p>
            <p style={{margin:"2px 0 0",fontSize:11,color:"#888"}}>{cart.reduce((s,i)=>s+i.qty,0)} productos</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#555"}}>✕</button>
        </div>
        <div style={{flex:1,padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
          {cart.length===0
            ?<div style={{textAlign:"center",padding:"50px 20px",color:"#bbb"}}>
                <div style={{fontSize:40}}>🛒</div>
                <p style={{marginTop:10,fontSize:13}}>Tu carrito está vacío</p>
              </div>
            :cart.map(item=>(
                <div key={`${item.id}-${item.selectedQty}`} style={{display:"flex",gap:10,padding:"10px",background:"#fafafa",borderRadius:8,border:"1px solid #eee"}}>
                  <div style={{fontSize:28,width:44,height:44,background:"#fffbea",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>
                    {item.imageUrl?<img src={item.imageUrl} style={{width:44,height:44,objectFit:"cover",borderRadius:7}} onError={e=>{e.target.style.display="none";}}/>:item.emoji}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:"0 0 2px",fontSize:12,fontWeight:600,lineHeight:1.3}}>{item.name}</p>
                    <p style={{margin:"0 0 4px",fontSize:10,color:"#888"}}>{item.selectedQty}</p>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <button onClick={()=>onQtyChange(item,Math.max(1,item.qty-1))} style={{background:"#f0f0f0",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",fontWeight:700,fontSize:14}}>-</button>
                      <span style={{fontSize:12,fontWeight:600,minWidth:20,textAlign:"center"}}>{item.qty}</span>
                      <button onClick={()=>onQtyChange(item,item.qty+1)} style={{background:"#f0f0f0",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",fontWeight:700,fontSize:14}}>+</button>
                      <span style={{marginLeft:"auto",fontSize:13,fontWeight:700}}>{fm(item.price*item.qty)}</span>
                    </div>
                  </div>
                  <button onClick={()=>onRemove(item)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:15,alignSelf:"center"}}>🗑️</button>
                </div>
              ))
          }
        </div>
        {cart.length>0&&(
          <div style={{padding:"12px 16px",borderTop:"1px solid #eee"}}>
            <p style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Fecha de retiro</p>
            <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}
              style={{width:"100%",padding:"7px 10px",fontSize:12,border:"1.5px solid #e0e0e0",borderRadius:6,marginBottom:10,outline:"none"}}/>
            <p style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Forma de pago</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
              {PAGOS.map(pg2=>(
                <button key={pg2.id} onClick={()=>setPago(pg2.id)}
                  style={{padding:"8px 5px",border:pago===pg2.id?"2px solid #1a1a1a":"1.5px solid #e0e0e0",
                          borderRadius:6,background:pago===pg2.id?"#FFE000":"#fff",cursor:"pointer",
                          textAlign:"center",fontSize:11,fontWeight:pago===pg2.id?700:400}}>
                  <span style={{fontSize:15,display:"block",marginBottom:2}}>{pg2.icon}</span>
                  {pg2.label}
                  {pg2.sub&&<span style={{display:"block",fontSize:9,color:"#e22"}}>{pg2.sub}</span>}
                </button>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
              <span style={{color:"#666"}}>Subtotal</span><span>{fm(subtotal)}</span>
            </div>
            {recargo>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#e22",marginBottom:3}}>
              <span>Recargo crédito (15%)</span><span>+{fm(recargo)}</span>
            </div>}
            <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:800,borderTop:"2px solid #FFE000",paddingTop:8,marginTop:5,marginBottom:12}}>
              <span>Total</span><span>{fm(total)}</span>
            </div>
            <button onClick={()=>onCheckout(pago,fecha,total)}
              style={{width:"100%",background:"#25D366",color:"#fff",border:"none",padding:"13px",borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:6}}>
              📲 Pedir por WhatsApp
            </button>
            <button onClick={onClose}
              style={{width:"100%",background:"none",color:"#888",border:"1px solid #e0e0e0",padding:"9px",borderRadius:6,fontSize:12,cursor:"pointer"}}>
              Seguir comprando
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP PRINCIPAL ── */
function App(){
  const [products,setProducts]=useState(PRODUCTS_DEFAULT);
  const [sales,setSales]=useState([]);
  const [loading,setLoading]=useState(true);

  // Cargar datos desde Firebase al iniciar
  useEffect(()=>{
    async function cargar(){
      setLoading(true);
      const prods=await fbLoadProducts();
      if(prods&&prods.length>0){setProducts(prods);}
      else{
        // Primera vez: subir los productos por defecto a Firebase uno por uno
        const defaults=normalizeProducts(PRODUCTS_DEFAULT);
        await fbSaveProducts(defaults);
        setProducts(defaults);
      }
      const ventas=await fbLoadSales();
      setSales(ventas);
      setLoading(false);
    }
    cargar();
  },[]);

  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("todos");
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [selected,setSelected]=useState(null);
  const [sortBy,setSortBy]=useState("relevance");
  const [onlyOferta,setOnlyOferta]=useState(false);
  const [wishlist,setWishlist]=useState([]);
  const [toast,setToast]=useState("");

  /* Panel state */
  const [panel,setPanel]=useState(null); // "admin"|"venta"|"stats"
  const [pinTarget,setPinTarget]=useState(null); // "admin"|"venta"|"stats"
  const [authed,setAuthed]=useState(false);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  const handlePanelBtn=(target)=>{
    setPinTarget(target);
  };

  const handlePinAuth=()=>{
    setAuthed(true);
    setPanel(pinTarget);
    setPinTarget(null);
  };

  const saveProducts=(prods,changedId=null,deletedId=null)=>{
    setProducts(prods);
    if(deletedId){
      fbDeleteProduct(deletedId);
      // Save remaining normally (just update local state, deletion handled)
    } else if(changedId){
      const p=prods.find(x=>String(x.id)===String(changedId));
      if(p) fbSaveOneProduct(p);
    } else {
      fbSaveProducts(prods);
    }
  };

  const saveSale=(sale)=>{
    const next=[sale,...sales];
    setSales(next);
    fbSaveSale(sale);
  };

  const addToCart=(p,sel)=>{
    const price=sel?sel.price:(p.oferta&&p.precioOferta?p.precioOferta:p.precios[0]?.price||0);
    const qty=sel?.qty||p.precios[0]?.qty||"1 unidad";
    setCart(prev=>{
      const ex=prev.find(i=>i.id===p.id&&i.selectedQty===qty);
      if(ex)return prev.map(i=>i.id===p.id&&i.selectedQty===qty?{...i,qty:i.qty+1}:i);
      return [...prev,{...p,price,selectedQty:qty,qty:1}];
    });
    showToast(`"${p.name.slice(0,26)}…" agregado ✓`);
  };

  const removeFromCart=(item)=>setCart(prev=>prev.filter(i=>!(i.id===item.id&&i.selectedQty===item.selectedQty)));
  const changeQty=(item,qty)=>setCart(prev=>prev.map(i=>i.id===item.id&&i.selectedQty===item.selectedQty?{...i,qty}:i));

  const filtered=useMemo(()=>{
    let res=products.filter(p=>{
      if(p.visible===false) return false;
      const matchCat=cat==="todos"||p.cat===cat;
      const matchSearch=p.name.toLowerCase().includes(search.toLowerCase())||p.code.includes(search);
      const matchOferta=!onlyOferta||p.oferta;
      return matchCat&&matchSearch&&matchOferta;
    });
    if(sortBy==="price_asc") res=[...res].sort((a,b)=>(a.precios[0]?.price||0)-(b.precios[0]?.price||0));
    if(sortBy==="price_desc")res=[...res].sort((a,b)=>(b.precios[0]?.price||0)-(a.precios[0]?.price||0));
    if(sortBy==="oferta")    res=[...res].sort((a,b)=>(b.oferta?1:0)-(a.oferta?1:0));
    return res;
  },[search,cat,sortBy,onlyOferta,products]);

  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const ofertaCount=products.filter(p=>p.oferta).length;

  const handleCheckout=(pago,fecha,total)=>{
    const pg=PAGOS.find(x=>x.id===pago);
    const lines=cart.map(i=>`• ${i.name} (${i.selectedQty}) x${i.qty} = ${fm(i.price*i.qty)}`).join("\n");
    const msg=`🛒 *Pedido Conti Hogar*\n\n${lines}\n\n💳 *Pago:* ${pg?.label||pago}\n💰 *Total:* ${fm(total)}\n📅 *Retiro:* ${fecha}\n\n¡Gracias! 🙌`;
    window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,"_blank");
  };

  return(
    <div style={{background:"#f5f5f5",minHeight:"100vh"}}>
      <Toast msg={toast}/>

      {/* ── PANTALLA DE CARGA ── */}
      {loading&&(
        <div style={{position:"fixed",inset:0,background:"#FFE000",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{fontSize:52}}>🧴</div>
          <div style={{fontSize:22,fontWeight:900,color:"#1a1a1a",letterSpacing:-.5}}>CONTI HOGAR</div>
          <div style={{fontSize:13,color:"#555"}}>Cargando productos…</div>
          <div style={{width:48,height:48,border:"5px solid #1a1a1a",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      )}

      {/* ── HEADER ── */}
      <header style={{background:"#FFE000",boxShadow:"0 2px 8px rgba(0,0,0,.12)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1280,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div onClick={()=>{setSearch("");setCat("todos");setOnlyOferta(false);}} style={{cursor:"pointer",minWidth:130}}>
            <div style={{fontSize:17,fontWeight:900,color:"#1a1a1a",letterSpacing:-.5,lineHeight:1.1}}>CONTI HOGAR</div>
            <div style={{fontSize:9,color:"#555",letterSpacing:.1,textTransform:"uppercase"}}>El toque mágico de la limpieza</div>
          </div>
          <div style={{flex:1,display:"flex",maxWidth:540}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Buscar por nombre o código de producto…"
              style={{flex:1,padding:"9px 13px",border:"none",borderRadius:"4px 0 0 4px",fontSize:13,outline:"none",boxShadow:"inset 0 0 0 1.5px #d4bb00"}}/>
            <button onClick={()=>setSearch("")}
              style={{background:"#fff",border:"none",borderRadius:"0 4px 4px 0",padding:"0 14px",cursor:"pointer",fontSize:16,borderLeft:"1px solid #d4bb00"}}>🔍</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
            <a href="https://www.instagram.com/conti.hogar" target="_blank"
              style={{fontSize:12,color:"#333",fontWeight:500}}>📷 @conti.hogar</a>
            <a href={`https://wa.me/${WA}`} target="_blank"
              style={{fontSize:12,color:"#1a7a3c",fontWeight:600}}>💬 WhatsApp</a>
            <button onClick={()=>setCartOpen(true)}
              style={{background:"none",border:"none",cursor:"pointer",position:"relative",fontSize:22,lineHeight:1}}>
              🛒
              {cartCount>0&&<span style={{position:"absolute",top:-6,right:-8,background:"#1a1a1a",color:"#FFE000",borderRadius:"50%",width:18,height:18,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{cartCount}</span>}
            </button>
            {/* ── BOTONES INTERNOS ── */}
            <div style={{display:"flex",gap:2,borderLeft:"1.5px solid rgba(0,0,0,.15)",paddingLeft:8,marginLeft:4}}>
              <button className="admin-btn" onClick={()=>handlePanelBtn("admin")} title="Administración — Editar productos">
                ⚙️
              </button>
              <button className="admin-btn" onClick={()=>handlePanelBtn("venta")} title="Registrar Venta Interna">
                🧾
              </button>
              <button className="admin-btn" onClick={()=>handlePanelBtn("stats")} title="Estadísticas de Ventas">
                📊
              </button>
            </div>
          </div>
        </div>
        {/* Categorías */}
        <div style={{maxWidth:1280,margin:"0 auto",padding:"0 14px 8px",display:"flex",gap:2,overflowX:"auto"}}>
          {CATS.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)}
              style={{background:cat===c.id?"rgba(0,0,0,.1)":"none",border:"none",padding:"5px 10px",
                      borderRadius:4,cursor:"pointer",fontSize:12,fontWeight:cat===c.id?700:400,
                      color:"#1a1a1a",whiteSpace:"nowrap"}}>
              {c.icon} {c.label}
            </button>
          ))}
        </div>
      </header>

      <main style={{maxWidth:1280,margin:"0 auto",padding:14}}>
        {/* ── BANNER ── */}
        <div style={{borderRadius:10,background:"#1a1a1a",marginBottom:14,padding:"20px 30px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"relative",overflow:"hidden"}}>
          <div style={{zIndex:1}}>
            <span style={{display:"inline-block",background:"#FFE000",color:"#1a1a1a",fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:999,marginBottom:8,textTransform:"uppercase",letterSpacing:.7}}>
              ⚡ {ofertaCount} Ofertas activas
            </span>
            <p style={{margin:0,fontSize:24,fontWeight:900,color:"#fff",lineHeight:1.1}}>Limpieza a tu medida</p>
            <p style={{margin:"5px 0 12px",fontSize:12,color:"#aaa"}}>Productos de calidad · Precios por cantidad · Entrega a domicilio</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>setOnlyOferta(true)}
                style={{background:"#FFE000",color:"#1a1a1a",border:"none",padding:"8px 18px",borderRadius:4,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                Ver todas las ofertas
              </button>
              <a href={`https://wa.me/${WA}`} target="_blank"
                style={{background:"#25D366",color:"#fff",padding:"8px 18px",borderRadius:4,fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:4}}>
                💬 Consultanos
              </a>
            </div>
          </div>
          <div style={{fontSize:110,opacity:.07,position:"absolute",right:20,top:"50%",transform:"translateY(-50%)"}}>🧴</div>
        </div>

        {/* ── FILTROS ── */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"8px 12px",background:"#fff",borderRadius:8,border:"1px solid #eee",flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#555",fontWeight:500}}>{filtered.length} resultado{filtered.length!==1?"s":""}</span>
          <div style={{width:1,height:18,background:"#eee"}}/>
          <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer"}}>
            <input type="checkbox" checked={onlyOferta} onChange={e=>setOnlyOferta(e.target.checked)}/>
            Solo ofertas ⚡
          </label>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,color:"#666"}}>Ordenar:</span>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
              style={{padding:"5px 9px",border:"1px solid #ddd",borderRadius:4,fontSize:12,background:"#fff",cursor:"pointer",outline:"none"}}>
              <option value="relevance">Relevancia</option>
              <option value="price_asc">Menor precio</option>
              <option value="price_desc">Mayor precio</option>
              <option value="oferta">Ofertas primero</option>
            </select>
          </div>
        </div>

        {/* ── GRILLA ── */}
        {filtered.length===0
          ?<div style={{textAlign:"center",padding:"60px 20px",color:"#aaa"}}>
              <div style={{fontSize:48}}>🔍</div>
              <p style={{fontSize:15,marginTop:12,color:"#666"}}>No encontramos resultados para "<b>{search||"tu búsqueda"}</b>"</p>
              <button onClick={()=>{setSearch("");setCat("todos");setOnlyOferta(false);}}
                style={{marginTop:14,padding:"9px 24px",background:"#FFE000",color:"#1a1a1a",border:"none",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:13}}>
                Ver todos los productos
              </button>
            </div>
          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:12}}>
              {filtered.map(p=>(
                <ProductCard key={p.id} p={p}
                  onSelect={setSelected}
                  onAdd={x=>addToCart(x,null)}
                  wished={wishlist.includes(p.id)}
                  onWish={id=>setWishlist(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id])}/>
              ))}
            </div>
        }
      </main>

      {/* ── FOOTER ── */}
      <footer style={{background:"#1a1a1a",marginTop:36,padding:"28px 16px"}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:20,marginBottom:20}}>
          <div>
            <div style={{fontSize:15,fontWeight:900,color:"#FFE000",letterSpacing:-.5,marginBottom:4}}>CONTI HOGAR</div>
            <div style={{fontSize:11,color:"#888",lineHeight:1.6}}>El toque mágico de la limpieza.<br/>Productos de calidad al mejor precio.</div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#FFE000",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Contacto</div>
            <a href={`https://wa.me/${WA}`} target="_blank" style={{display:"block",fontSize:12,color:"#25D366",marginBottom:5}}>💬 WhatsApp: +54 343 5188348</a>
            <a href="https://www.instagram.com/conti.hogar" target="_blank" style={{display:"block",fontSize:12,color:"#aaa"}}>📷 Instagram: @conti.hogar</a>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#FFE000",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Pagos aceptados</div>
            {PAGOS.map(p=><div key={p.id} style={{fontSize:12,color:"#888",marginBottom:4}}>{p.icon} {p.label}{p.sub?` ${p.sub}`:""}</div>)}
          </div>
        </div>
        <div style={{maxWidth:1280,margin:"0 auto",paddingTop:16,borderTop:"1px solid #333",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <span style={{fontSize:11,color:"#555"}}>© 2025 Conti Hogar · Todos los derechos reservados</span>
          <span style={{fontSize:11,color:"#555"}}>Hecho con ❤️ en Argentina</span>
        </div>
      </footer>

      {/* ── MODALES ── */}
      {cartOpen&&<CartDrawer cart={cart} onClose={()=>setCartOpen(false)} onRemove={removeFromCart} onQtyChange={changeQty} onCheckout={(p,f,t)=>{handleCheckout(p,f,t);}}/>}
      {selected&&<ProductModal p={selected} onClose={()=>setSelected(null)} onAdd={(p,sel)=>{addToCart(p,sel);setSelected(null);}}/>}
      {pinTarget&&<PinGate title={pinTarget==="admin"?"Panel de Administración":pinTarget==="venta"?"Registrar Venta":"Ver Estadísticas"} onAuth={handlePinAuth} onClose={()=>setPinTarget(null)}/>}
      {panel==="admin"&&<AdminPanel products={products} onClose={()=>setPanel(null)} onSave={saveProducts}/>}
      {panel==="venta"&&<VentaInterna products={products} onClose={()=>setPanel(null)} onSave={saveSale}/>}
      {panel==="stats"&&<EstadisticasPanel sales={sales} onClose={()=>setPanel(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
